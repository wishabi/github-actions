name: "eks-deploy"
description: 'Custom GitHub action that deploys the repository to EKS using its "/deploy/build.sh" script'

inputs:
  ENV:
    description: Application environment (staging or production)
    required: true
  TIMEOUT:
    description: Timeout in minutes (e.g. '5m') for the deployment step
    required: false
  AWS_ACCESS_KEY_ID:
    description: AWS access key id stored as secret (required for static credential auth)
    required: false
  AWS_SECRET_ACCESS_KEY:
    description: AWS secret access key stored as secret (required for static credential auth)
    required: false
  AWS_ROLE_ARN:
    description: IAM role ARN for OIDC-based authentication (requires id-token:write permission on the calling job)
    required: false
  AWS_REGION:
    description: AWS region to deploy to
    required: true
  SLACK_SUCCESS_CHANNEL_ID:
    description: The Slack channel ID(s) to send successful deployment notifications
    required: false
  SLACK_FAILURE_CHANNEL_ID:
    description: The Slack channel ID(s) to send failed deployment notifications
    required: false
  SLACK_BOT_TOKEN:
    description: The Slack bot token to pass the data to
    required: false
  ATOMIC:
    description: EKS Atomic Deployment Flag (true or false) - default is true
    required: false
  CLEAN_WORKSPACE:
    description: Whether to clean the workspace before deploying (true or false)
    required: false
    default: "true"
  MULTI_ARCH_BUILD:
    description: |
      Multi-architecture build opt-in for build.sh. When set, the action installs QEMU + Buildx and exports DOCKER_PLATFORMS to the environment so `platform_deploy` (from `platform-infrastructure`) takes the `docker buildx build --push` path. Accepts:
        - "false" or empty (default): single-arch, no buildx setup
        - "true": shorthand for "linux/amd64,linux/arm64"
        - any comma-separated platform list (e.g. "linux/arm64"): used verbatim
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Get branch and commit info
      id: branch-info
      uses: wishabi/github-actions/common/branch-info@v0
    - name: Validate AWS credentials input
      shell: bash
      env:
        AWS_ROLE_ARN_INPUT: ${{ inputs.AWS_ROLE_ARN }}
        AWS_ACCESS_KEY_ID_INPUT: ${{ inputs.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY_INPUT: ${{ inputs.AWS_SECRET_ACCESS_KEY }}
      run: |
        if [ -z "$AWS_ROLE_ARN_INPUT" ] && { [ -z "$AWS_ACCESS_KEY_ID_INPUT" ] || [ -z "$AWS_SECRET_ACCESS_KEY_INPUT" ]; }; then
          echo "::error::Either AWS_ROLE_ARN (IAM auth) or both AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY (static auth) must be provided."
          exit 1
        fi
    - name: Configuring AWS credentials (IAM role)
      if: ${{ inputs.AWS_ROLE_ARN != '' }}
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ inputs.AWS_ROLE_ARN }}
        aws-region: ${{ inputs.AWS_REGION }}
    - name: Configuring AWS credentials (static)
      if: ${{ inputs.AWS_ROLE_ARN == '' }}
      uses: aws-actions/configure-aws-credentials@v6
      with:
        aws-access-key-id: ${{ inputs.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ inputs.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ inputs.AWS_REGION }}
    - uses: actions/checkout@v6
    - name: Cleaning workspace
      if: ${{ inputs.CLEAN_WORKSPACE == 'true' }}
      shell: bash
      run: shopt -s dotglob && rm -rf "$GITHUB_WORKSPACE"/*
    - name: Restoring workspace from cache
      uses: wishabi/github-actions/cache@v0
    - name: Resolve multi-arch platforms
      id: multi-arch
      shell: bash
      env:
        MULTI_ARCH_INPUT: ${{ inputs.MULTI_ARCH_BUILD }}
      run: |
        case "$MULTI_ARCH_INPUT" in
          ""|"false")
            platforms=""
            ;;
          "true")
            platforms="linux/amd64,linux/arm64"
            ;;
          *)
            platforms="$MULTI_ARCH_INPUT"
            ;;
        esac
        echo "platforms=$platforms" >> "$GITHUB_OUTPUT"
        if [ -n "$platforms" ]; then
          echo "DOCKER_PLATFORMS=$platforms" >> "$GITHUB_ENV"
          echo "Multi-arch build enabled for platforms: $platforms"
        fi
    - name: Set up QEMU
      if: ${{ steps.multi-arch.outputs.platforms != '' }}
      uses: docker/setup-qemu-action@v4
    - name: Set up Docker Buildx
      if: ${{ steps.multi-arch.outputs.platforms != '' }}
      uses: docker/setup-buildx-action@v4
    - name: Deploying to EKS via Helm release
      shell: bash
      env:
        DEPLOY_ENV: ${{ inputs.ENV }}
        DEPLOY_TIMEOUT: ${{ inputs.TIMEOUT }}
        DEPLOY_ATOMIC: ${{ inputs.ATOMIC }}
      run: |
        chmod +x ./deploy/build.sh
        cmd=(./deploy/build.sh service deploy_eks --env="$DEPLOY_ENV")

        # Check if TIMEOUT is set and provide it as a flag
        if [ -n "$DEPLOY_TIMEOUT" ]; then
          cmd+=(--timeout="$DEPLOY_TIMEOUT")
        fi

        # Check if ATOMIC is set and provide it as a flag
        if [ -n "$DEPLOY_ATOMIC" ]; then
          cmd+=(--atomic="$DEPLOY_ATOMIC")
        fi

        # Execute command
        "${cmd[@]}"
    - name: Notify slack channel on success
      if: success() && inputs.SLACK_SUCCESS_CHANNEL_ID != ''
      uses: slackapi/slack-github-action@v1.27.1
      env:
        SLACK_BOT_TOKEN: ${{ inputs.SLACK_BOT_TOKEN }}
      with:
        channel-id: ${{ inputs.SLACK_SUCCESS_CHANNEL_ID }}
        payload: |
          {
            "text": "EKS Deployment Succeeded",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "EKS Deployment Succeeded",
                  "emoji": true
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Repository*\n<https://github.com/${{ github.repository }}|${{ github.repository }}>\n\n*Environment*\n${{ inputs.ENV }}"
                },
                "accessory": {
                  "type": "image",
                  "image_url": "https://emoji.slack-edge.com/T02AJQYGN/shipped/43553cbf473da4d5.png",
                  "alt_text": "deploy fail icon"
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Branch*"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Commit*"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "${{ format('<https://github.com/{0}/commit/{1}|{2}>', github.repository, github.sha, steps.branch-info.outputs.branch)}}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "${{ steps.branch-info.outputs.short_sha }}"
                  }
                ]
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "*Triggered By:* ${{ github.triggering_actor }}"
                  }
                ]
              },
              {
                "type": "divider"
              }
            ]
          }
    - name: Notify slack channel on failure
      if: failure() && inputs.SLACK_FAILURE_CHANNEL_ID != ''
      uses: slackapi/slack-github-action@v1.27.1
      env:
        SLACK_BOT_TOKEN: ${{ inputs.SLACK_BOT_TOKEN }}
      with:
        channel-id: ${{ inputs.SLACK_FAILURE_CHANNEL_ID }}
        payload: |
          {
            "text": "EKS Deployment Failed",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "EKS Deployment Failed",
                  "emoji": true
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Repository*\n<https://github.com/${{ github.repository }}|${{ github.repository }}>\n\n*Environment*\n${{ inputs.ENV }}"
                },
                "accessory": {
                  "type": "image",
                  "image_url": "https://emoji.slack-edge.com/T02AJQYGN/sad-cloud/d78efc194125ff42.png",
                  "alt_text": "deploy fail icon"
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Branch*"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Commit*"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "${{ format('<https://github.com/{0}/commit/{1}|{2}>', github.repository, github.sha, steps.branch-info.outputs.branch)}}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "${{ steps.branch-info.outputs.short_sha }}"
                  }
                ]
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "*Triggered By:* ${{ github.triggering_actor }}"
                  }
                ]
              },
              {
                "type": "divider"
              }
            ]
          }
