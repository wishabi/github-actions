name: "Go Build"
description: "Build go repo"

inputs:
  FLIPPCIRCLECIPULLER_REPO_TOKEN:
    description: Flipp circleci repo token
    required: true
  BUF_BUILD_USER:
    description: Buf CI user stored as secret
    required: false
  BUF_BUILD_API_TOKEN:
    description: Buf API token stored as secret
    required: false
  SLACK_CHANNEL_ID:
    description: The Slack channel ID(s) to send the data to
    required: false
  SLACK_BOT_TOKEN:
    description: The Slack bot token to pass the data to
    required: false
  MOCKERY_INSTALL_VERSION:
    description: The version of mockery to use
    required: false
    default: ""
  CODE_GEN_COMMANDS:
    description: Shell commands to run before go mod tidy (e.g. sqlc generate, wire, ent generate)
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Get branch and commit info
      id: branch-info
      uses: wishabi/github-actions/common/branch-info@v0
    - name: Configure Go environment
      uses: wishabi/github-actions/go/configure@v0
      with:
        FLIPPCIRCLECIPULLER_REPO_TOKEN: ${{ inputs.FLIPPCIRCLECIPULLER_REPO_TOKEN }}
        BUF_BUILD_USER: ${{ inputs.BUF_BUILD_USER }}
        BUF_BUILD_API_TOKEN: ${{ inputs.BUF_BUILD_API_TOKEN }}
    - name: Setup Go dependencies
      uses: wishabi/github-actions/go/deps@v0
      env:
        BUF_TOKEN: ${{ inputs.BUF_BUILD_API_TOKEN }}
      with:
        FLIPPCIRCLECIPULLER_REPO_TOKEN: ${{ inputs.FLIPPCIRCLECIPULLER_REPO_TOKEN }}
        MOCKERY_INSTALL_VERSION: ${{ inputs.MOCKERY_INSTALL_VERSION }}
        CODE_GEN_COMMANDS: ${{ inputs.CODE_GEN_COMMANDS }}
    - name: Write build summary
      if: always()
      shell: bash
      run: |
        echo "## Go Build Results" >> $GITHUB_STEP_SUMMARY
        echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Go | $(go version | awk '{print $3}') |" >> $GITHUB_STEP_SUMMARY
        echo "| Repository | ${{ github.repository }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Commit | ${{ steps.branch-info.outputs.short_sha }} |" >> $GITHUB_STEP_SUMMARY
        if [ "${{ job.status }}" = "success" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Build passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Build failed** — check the logs above for details" >> $GITHUB_STEP_SUMMARY
        fi
    - name: Notify slack channel on failure
      if: failure() && inputs.SLACK_CHANNEL_ID != '' && github.ref == 'refs/heads/main'
      uses: slackapi/slack-github-action@v1.27.1
      env:
        SLACK_BOT_TOKEN: ${{ inputs.SLACK_BOT_TOKEN }}
      with:
        channel-id: ${{ inputs.SLACK_CHANNEL_ID }}
        payload: |
          {
            "text": "Go Build Failed",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "Go Build Failed",
                  "emoji": true
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Repository*\n<https://github.com/${{ github.repository }}|${{ github.repository }}>\n\n*${{ github.event_name == 'pull_request' && 'Pull Request' || 'Branch' }}*\n${{ github.event_name == 'pull_request' && format('<{0}|{1}>', github.event.pull_request.html_url, github.event.pull_request.title) || format('<https://github.com/{0}/commit/{1}|{2}>', github.repository, github.sha, steps.branch-info.outputs.branch)}}"
                },
                "accessory": {
                  "type": "image",
                  "image_url": "https://emoji.slack-edge.com/T02AJQYGN/fail/d35657341d0b7dc4.png",
                  "alt_text": "error icon"
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Version/Commit*"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Event*"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "${{ steps.branch-info.outputs.short_sha }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "${{ github.event_name }}"
                  }
                ]
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "*Triggered By:* ${{ github.triggering_actor }}"
                  }
                ]
              }
            ]
          }
