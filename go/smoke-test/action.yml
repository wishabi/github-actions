name: 'Smoke Test'
description: 'Runs Go smoke tests'
inputs:
  SLACK_CHANNEL_ID:
    description: The Slack channel ID(s) to send the data to
    required: false
  SLACK_BOT_TOKEN:
    description: The Slack bot token to pass the data to
    required: false
  ENV:
    description: Environment name used for rollback and Slack messages
    required: false
    default: 'ENV input not provided'
  ROLLBACK_ON_FAIL:
    description: Rollback the deployment on smoke test failure (pass 'true')
    required: false
    default: 'false'
  GO_SMOKE:
    description: Run go smoke tests
    required: false
    default: 'true'
  DD_SYNTHETIC_IDS:
    description: Public IDs of DataDog Synthetic tests to run
    required: false
  DD_API_KEY:
    description: DataDog API key
    required: false
  DD_APP_KEY:
    description: DataDog App key for sythetic runs
    required: false

runs:
  using: 'composite'
  steps:
    - name: Get branch and commit info
      id: branch-info
      uses: wishabi/github-actions/common/branch-info@v0
    - name: Restore cache
      uses: wishabi/github-actions/cache@v0
    - name: Run Go Smoke Tests
      if: inputs.GO_SMOKE == 'true'
      run: |
        go test ./tests/smoke --tags=smoke
      shell: bash
    - name: Run DataDog Synthetics
      if: inputs.DD_SYNTHETIC_IDS != ''
      uses: DataDog/synthetics-ci-github-action@v4.0.0
      with:
        api-key: ${{ inputs.DD_API_KEY }}
        app-key: ${{ inputs.DD_APP_KEY }}
        public-ids: ${{ inputs.DD_SYNTHETIC_IDS }}
    - name: Write smoke test summary
      if: always()
      shell: bash
      env:
        SMOKE_ENV: ${{ inputs.ENV }}
        GO_SMOKE: ${{ inputs.GO_SMOKE }}
        DD_SYNTHETIC_IDS: ${{ inputs.DD_SYNTHETIC_IDS }}
        ROLLBACK_ON_FAIL: ${{ inputs.ROLLBACK_ON_FAIL }}
        JOB_STATUS: ${{ job.status }}
      run: |
        DD_ENABLED="no"
        if [ -n "$DD_SYNTHETIC_IDS" ]; then DD_ENABLED="yes"; fi
        echo "## Smoke Test Results" >> $GITHUB_STEP_SUMMARY
        echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Environment | $SMOKE_ENV |" >> $GITHUB_STEP_SUMMARY
        echo "| Go Smoke | $GO_SMOKE |" >> $GITHUB_STEP_SUMMARY
        echo "| DataDog Synthetics | $DD_ENABLED |" >> $GITHUB_STEP_SUMMARY
        echo "| Rollback on Fail | $ROLLBACK_ON_FAIL |" >> $GITHUB_STEP_SUMMARY
        if [ "$JOB_STATUS" = "success" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Smoke tests passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Smoke tests failed** — check the logs above for details" >> $GITHUB_STEP_SUMMARY
        fi
    - name: Rollback on failure
      if: failure() && inputs.ROLLBACK_ON_FAIL == 'true'
      env:
        DEPLOY_ENV: ${{ inputs.ENV }}
      run: |
        echo "WARNING: Rolling back service"
        chmod +x ./deploy/build.sh && ./deploy/build.sh service rollback --env="$DEPLOY_ENV"
      shell: bash
    - name: Notify slack channel on failure
      if: failure() && inputs.SLACK_CHANNEL_ID != ''
      uses: slackapi/slack-github-action@v3.0.3
      with:
        method: chat.postMessage
        token: ${{ inputs.SLACK_BOT_TOKEN }}
        payload: |
          {
            "channel": "${{ inputs.SLACK_CHANNEL_ID }}",
            "text": "Smoke Test Failed",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "Smoke Test Failed",
                  "emoji": true
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Repository*\n<https://github.com/${{ github.repository }}|${{ github.repository }}>\n\n*Environment*\n${{ inputs.ENV }}"
                },
                "accessory": {
                  "type": "image",
                  "image_url": "https://a.slack-edge.com/production-standard-emoji-assets/14.0/apple-large/1f6ad@2x.png",
                  "alt_text": "smoke test fail icon"
                }
              },
              {
                "type": "divider"
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Branch*\n${{ format('<https://github.com/{0}/commit/{1}|{2}>', github.repository, github.sha, steps.branch-info.outputs.branch)}}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Commit*\n${{ steps.branch-info.outputs.short_sha }}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Rollback Status*\n${{ inputs.ROLLBACK_ON_FAIL }}"
                  }
                ]
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "*Triggered By:* ${{ github.triggering_actor }}"
                  }
                ]
              }
            ]
          }
