name: 'go-test'
description: 'Custom GitHub action that runs all Golang tests within a repository and saves the test + coverage reports as artifacts'

inputs:
  TAGS:
    description: Set of tags to run tests with.
    required: false
  TIMEOUT:
    description: A timeout value in seconds. If tests take longer than this, they will fail. Not setting this value will fallback to go test's default of 10 minutes.
    required: false
    default: ""
  PARALLEL:
    description: Whether to run tests in parallel. Defaults to true.
    required: false
    default: "true"
  ARTIFACT_RETENTION_DAYS:
    description: Number of days to retain test and coverage artifacts.
    required: false
    default: "1"

runs:
  using: 'composite'
  steps:
    - name: Running go tests
      shell: bash
      run: ${GITHUB_ACTION_PATH}/test.sh "${{ inputs.TAGS }}" "${{ inputs.TIMEOUT }}" "${{ inputs.PARALLEL }}"
    - name: Write test summary
      if: always()
      shell: bash
      run: |
        echo "## Go Test Results" >> $GITHUB_STEP_SUMMARY
        if [ -f test-report.out ]; then
          PASS=$(grep -c '^ok' test-report.out || true)
          FAIL=$(grep -c '^FAIL' test-report.out || true)
          SKIP=$(grep -c '\[no test files\]' test-report.out || true)
          echo "| Status | Packages |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | ${PASS} |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | ${FAIL} |" >> $GITHUB_STEP_SUMMARY
          echo "| No Tests | ${SKIP} |" >> $GITHUB_STEP_SUMMARY
          if [ "$FAIL" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Failed Packages</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep '^FAIL' test-report.out >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "> **Warning:** No test report found" >> $GITHUB_STEP_SUMMARY
        fi
    - name: Uploading test report
      uses: actions/upload-artifact@v4
      with:
        name: "${{ github.sha }}-test-report.out"
        path: "./test-report.out"
        retention-days: ${{ inputs.ARTIFACT_RETENTION_DAYS }}
    - name: Uploading coverage report
      uses: actions/upload-artifact@v4
      with:
        name: "${{ github.sha }}-coverage.out"
        path: "./coverage.out"
        retention-days: ${{ inputs.ARTIFACT_RETENTION_DAYS }}
