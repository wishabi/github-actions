name: Secret Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: wishabi/github-shared-actions/actions/secret-scan@main
        id: scan
        with:
          base-sha: ${{ github.event.pull_request.base.sha || github.event.before }}
          head-sha: ${{ github.event.pull_request.head.sha || github.event.after }}
